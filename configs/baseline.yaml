# Baseline: ViT5 on clean data only
method: baseline
model_name: VietAI/vit5-base

# Training
batch_size: 8
learning_rate: 5.0e-5
num_epochs: 3
subset_ratio: 0.2  # Use 20% of dataset

# Data
max_input_length: 256
max_output_length: 64
use_noisy_aug: false

# Paths (relative to project root)
data_dir: data/ReceiptVQA-Dataset
output_dir: outputs/models/baseline
results_file: outputs/results/baseline_results.csv
log_file: outputs/logs/baseline.log
